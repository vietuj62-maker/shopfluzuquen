
<!DOCTYPE html>
<html>

<head>
<title>Roblox Item Shop</title>

<style>

body{
background:#0b1f3a;
font-family:Arial;
color:white;
margin:0;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#08152b;
}

.shop{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:#1c2b44;
padding:15px;
border-radius:12px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

button{
background:#22c55e;
border:none;
padding:8px 20px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="topbar">
<h2>Roblox Item Shop</h2>
<div>Xin chào User</div>
</div>

<div class="shop">

<div class="card">
<img src="https://i.imgur.com/0y0y0y0.png">
<h3>Race Reroll</h3>
<p>10.000đ</p>
<button>Mua</button>
</div>

<div class="card">
<img src="https://i.imgur.com/0y0y0y0.png">
<h3>Clan Reroll</h3>
<p>10.000đ</p>
<button>Mua</button>
</div>

<div class="card">
<img src="https://i.imgur.com/0y0y0y0.png">
<h3>Aura Crate</h3>
<p>5.000đ</p>
<button>Mua</button>
</div>

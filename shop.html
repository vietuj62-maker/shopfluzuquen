<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Roblox Shop</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1f3a;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#08152b;
}

.shop{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:#1c2b44;
border-radius:12px;
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

.price{
margin:10px 0;
}

button{
background:#22c55e;
border:none;
padding:8px 18px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<div class="topbar">
<h2>Roblox Item Shop</h2>
<div>Xin chào User</div>
</div>

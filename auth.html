<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auth</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Đăng ký</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mật khẩu"><br><br>

<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>

<p id="msg"></p>

<script>

const supabase = window.supabase.createClient(
"https://YOUR_PROJECT.supabase.co",
"YOUR_ANON_KEY"
)

async function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({
email:email,
password:password
})

if(error){
document.getElementById("msg").innerText=error.message
}else{
document.getElementById("msg").innerText="Đăng ký thành công! Kiểm tra Gmail để xác minh."
}

}

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

const {data,error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){
document.getElementById("msg").innerText="Sai tài khoản hoặc mật khẩu"
}else{

localStorage.setItem("user",email)

document.getElementById("msg").innerText="Đăng nhập thành công"

window.location="index.html"

}

}

</script>

</body>
</html>

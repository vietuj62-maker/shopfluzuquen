<!DOCTYPE html>
<html>
<head>
<title>Shop Roblox</title>

<style>

body{
font-family:Arial;
background:#111827;
color:white;
text-align:center;
padding-top:150px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.login{
background:#3b82f6;
color:white;
}

.register{
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<h1>SHOP ROBLOX</h1>

<p>Mua item Roblox giá rẻ</p>

<button class="login" onclick="goLogin()">Đăng nhập</button>

<button class="register" onclick="goRegister()">Đăng ký</button>

<script>

let user = localStorage.getItem("user")

if(user){

window.location="shop.html"

}

function goLogin(){

window.location="login.html"

}

function goRegister(){

window.location="register.html"

}

</script>

</body>
</html>

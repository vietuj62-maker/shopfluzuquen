<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<Sailor>Shop Roblox</Piece>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:white;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-weight:bold;
font-size:20px;
color:#ff3c3c;
}

.menu a{
margin:0 10px;
text-decoration:none;
color:#333;
}

.login{
background:#ff3c3c;
color:white;
padding:6px 12px;
border-radius:5px;
}

.banner{
width:100%;
height:300px;
background:url("https://wallpaperaccess.com/full/2895664.jpg") center/cover;
}

.section{
padding:20px;
}

.section h2{
background:#8b0000;
color:white;
padding:8px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:red;
font-weight:bold;
}

button{
background:#ff3c3c;
border:none;
color:white;
padding:6px 10px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#e52e2e;
}

</style>
</head>

<body>

<header>

<div class="logo">SHOP ROBLOX</div>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#">Danh mục game</a>

</div>

</header>

<div class="banner"></div>

<div class="section">

<div class="products">

<div class="card">
<img src="https://i.ytimg.com/vi/0S5QzCzk1jA/maxresdefault.jpg">
<div class="card-body">
<h4> Trait reroll-7.000</h4>
<p class="price">10.000VND</p>
<button>Mua ngay</button>
</div>
</div>

<div class="card">
<img src="https://i.ytimg.com/vi/QB0AxT1wM3E/maxresdefault.jpg">

<p class="price">10.000VND</p>

</div>

<button>Mua ngay</button>
</div>
</div>
